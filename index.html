<!DOCTYPE html>
<html>
<head>
    <title>Elyséa | Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(to right, #f8e8ee, #e3d5f5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 320px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 10px;
            color: #8a4f7d;
        }

        .login-box p {
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }

        .input-box {
            margin-bottom: 15px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background-color: #8a4f7d;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .login-btn:hover {
            background-color: #6f3d65;
        }

        .extra-links {
            margin-top: 15px;
            font-size: 13px;
        }

        .extra-links a {
            text-decoration: none;
            color: #8a4f7d;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Elyséa</h2>
        <p>Enter your world of divine fragrance</p>

        <form>
            <div class="input-box">
                <input type="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="extra-links">
            <p><a href="#">Forgot Password?</a></p>
            <p>Don't have an account? <a href="#">Sign Up</a></p>
        </div>
    </div>

</body>
</html>
